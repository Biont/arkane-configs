# Hardcoded upstream DNS (don't use resolv.conf)
no-resolv
server=8.8.8.8
server=8.8.4.4

# Forward local Fritz!Box network queries to the router
server=/fritz.box/192.168.178.1

# dnsmasq config to resolve *.ddev.site to 127.0.0.1
address=/.ddev.site/127.0.0.1

# Resolve local LLM service hostnames
address=/webui.internal/127.0.0.1
address=/ollama.internal/127.0.0.1

# Allow DNS rebinding for DDEV local development
rebind-domain-ok=/ddev.site/

# Only bind to listen-address, don't grab all interfaces.
# This is critical for Waydroid which runs its own dnsmasq on 192.168.250.1
bind-interfaces
